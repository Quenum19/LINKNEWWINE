<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nos Réseaux - New Wine Church</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background: linear-gradient(to bottom right, #ff5722, #8e24aa);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      justify-content: center;
      padding: 20px;
      background-image: url('https://images.unsplash.com/photo-1519389950473-47ba0277781c');
      background-size: cover;
      background-position: center;
      backdrop-filter: blur(6px);
    }

    .container {
      background-color: rgba(0, 0, 0, 0.6);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
      margin-bottom: 30px;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      font-size: 16px;
      margin-bottom: 30px;
    }

    .logo {
      margin-bottom: 20px;
    }

    #logo-nw {
      height: 150px;
      max-width: 100%;
      border-radius: 10px;
    }

    .link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: white;
      color: #333;
      padding: 12px 20px;
      margin: 10px 0;
      border-radius: 12px;
      text-decoration: none;
      font-weight: bold;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .link:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .link img {
      height: 30px;
      margin-right: 15px;
    }

    .link span {
      flex-grow: 1;
      text-align: left;
    }

    /* Media Queries pour rendre le site responsive */
    @media (max-width: 480px) {
      .link {
        padding: 10px 15px;
      }
      h1 {
        font-size: 22px;
      }
      .container {
        padding: 20px;
        max-width: 90%;
      }
      #logo-nw {
        height: 120px;
      }
    }

    footer {
      text-align: center;
      color: white;
      font-size: 14px;
      margin-top: 20px;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <img src="publics/images/LOGO-NEW-WINE-png.png" id="logo-nw" alt="Logo New Wine Church">
    </div>
    <h1>Suivez-nous !</h1>
    <p>Connecte-toi avec la New Wine Church</p>


    <!-- Lien programme du culte Dimanche -->

      <span> Programme du Culte</span>
    </a>

    <!-- Liens des cartes -->
    <a class="link" href="carte_evang_2.html" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/854/854878.png" alt="Carte 2D">
      <span>🗺️ Carte Interactive 2D</span>
    </a>

    <a class="link" href="carte_evang_3d.html" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2983/2983878.png" alt="Carte 3D">
      <span>🌐 Carte 3D Avancée</span>
    </a>

    <a class="link" href="https://www.facebook.com/newinechurch1/" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
      <span>Facebook</span>
    </a>

    <a class="link" href="https://www.instagram.com/new_wine_church1" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
      <span>Instagram</span>
    </a>

    <a class="link" href="https://www.tiktok.com/@new_wine_church1?_t=ZM-908A8udKZiq&_r=1" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/3046/3046120.png" alt="TikTok">
      <span>TikTok</span>
    </a>

    <a class="link" href="https://www.youtube.com/@NewWineChurchMD" target="_blank">
      <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" alt="YouTube">
      <span>YouTube</span>
    </a>
  </div>
